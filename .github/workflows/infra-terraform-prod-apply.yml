name: Infra Terraform Prod Apply

on:
  push:
    branches:
      - main
    paths:
      - 'terraform/**'
      - '.github/workflows/infra-terraform-*.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: infra-terraform-prod-apply-${{ github.ref }}
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    environment: prod
    env:
      GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      GCP_REGION: ${{ vars.GCP_REGION }}
      TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
      TF_STATE_PREFIX: ${{ vars.TF_STATE_PREFIX }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required configuration
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
        run: |
          test -n "${GCP_PROJECT_ID:-}" || (echo "Missing repo variable GCP_PROJECT_ID" && exit 1)
          test -n "${GCP_REGION:-}" || (echo "Missing repo variable GCP_REGION" && exit 1)
          test -n "${TF_STATE_BUCKET:-}" || (echo "Missing repo variable TF_STATE_BUCKET" && exit 1)
          test -n "${GCP_SA_KEY:-}" || (echo "Missing secret GCP_SA_KEY (repo or environment 'prod')" && exit 1)

      - name: Auth to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5

      - name: Terraform init (gcs backend)
        run: |
          PREFIX="${TF_STATE_PREFIX:-terraform/prod}"
          terraform -chdir=terraform/live/prod init \
            -reconfigure \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="prefix=${PREFIX}"

      - name: Terraform apply
        run: |
          TFVARS_ARG=""
          if [ -f "terraform/live/prod/terraform.tfvars" ]; then
            TFVARS_ARG="-var-file=terraform/live/prod/terraform.tfvars"
          fi

          terraform -chdir=terraform/live/prod apply \
            -input=false \
            -auto-approve \
            -var="project_id=${GCP_PROJECT_ID}" \
            -var="region=${GCP_REGION}" \
            ${TFVARS_ARG}

      - name: Post-deploy smoke check
        run: |
          GATEWAY_HOST=$(terraform -chdir=terraform/live/prod output -raw gateway_default_hostname 2>/dev/null || true)
          if [ -n "${GATEWAY_HOST}" ]; then
            echo "Probing API Gateway: https://${GATEWAY_HOST}/health"
            curl -fsSL "https://${GATEWAY_HOST}/health" || true
          else
            echo "No gateway hostname output yet; skipping smoke check"
          fi