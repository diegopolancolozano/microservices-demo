swagger: '2.0'
info:
  title: microservices-demo-api
  description: API Gateway with Rate Limiting and Circuit Breaker
  version: 1.0.0

x-google-management:
  metrics:
    - name: "vote-requests"
      displayName: "Vote Requests"
      valueType: INT64
      metricKind: DELTA
  quotas:
    - name: "vote-quota"
      metric: "vote-requests"
      unit: "1/min/{project}"
      values:
        standard: 5

paths:
  /health:
    get:
      operationId: health
      x-google-backend:
        address: https://vote-6cfpor7wra-uc.a.run.app/health
      responses:
        '200':
          description: OK

  /vote:
    post:
      operationId: vote
      x-google-backend:
        address: https://vote-6cfpor7wra-uc.a.run.app
      x-google-quota: "vote-quota"
      responses:
        '200':
          description: OK
        '429':
          description: Rate limit exceeded

  /result:
    get:
      operationId: result
      x-google-backend:
        address: https://result-6cfpor7wra-uc.a.run.app
        deadline: 2.0
      responses:
        '200':
          description: OK
        '504':
          description: Gateway Timeout