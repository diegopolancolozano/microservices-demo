swagger: '2.0'
info:
  title: microservices-demo-api
  description: API Gateway with Rate Limiting and Circuit Breaker
  version: 1.0.0

x-google-management:
  metrics:
    - name: "vote-requests"
      displayName: "Vote Requests"
      valueType: INT64
      metricKind: DELTA
  quotas:
    - name: "vote-quota"
      metric: "vote-requests"
      unit: "1/min/{project}"
      values:
        standard: 5

paths:
  /health:
    get:
      operationId: health
      x-google-backend:
        address: https://REPLACE_ME_BACKEND_URL
      responses:
        '200':
          description: OK
  /vote:
    post:
      operationId: vote
      x-google-backend:
        address: https://REPLACE_ME_BACKEND_URL
      responses:
        '200':
          description: OK
        '429':
          description: Rate limit exceeded
  /result:
    get:
      operationId: result
      x-google-backend:
        address: https://REPLACE_ME_BACKEND_URL
        deadline: 2.0
      responses:
        '200':
          description: OK
        '504':
          description: Gateway Timeout