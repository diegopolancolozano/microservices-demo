openapi: 3.0.0
info:
  title: microservices-demo-api
  description: API Gateway with Rate Limiting and Circuit Breaker
  version: 1.0.0

# ============================================
# RATE LIMITING - 5 requests per minute
# ============================================
x-google-management:
  metrics:
    - name: "vote-requests"
      displayName: "Vote Requests"
      valueType: INT64
      metricKind: DELTA
  quotas:
    - name: "vote-quota"
      metric: "vote-requests"
      unit: "1/min/{project}"
      values:
        standard: 5

paths:
  # Health check
  /health:
    get:
      operationId: health
      x-google-backend:
        address: https://REPLACE_ME_BACKEND_URL
      responses:
        '200':
          description: OK

  # Vote endpoint with RATE LIMITING
  /vote:
    post:
      operationId: vote
      x-google-backend:
        address: https://REPLACE_ME_BACKEND_URL
      x-google-quota: "vote-quota"
      responses:
        '200':
          description: OK
        '429':
          description: Rate limit exceeded

  # Result endpoint with CIRCUIT BREAKER (2 second timeout)
  /result:
    get:
      operationId: result
      x-google-backend:
        address: https://REPLACE_ME_BACKEND_URL
        deadline: 2.0
      responses:
        '200':
          description: OK
        '504':
          description: Gateway Timeout